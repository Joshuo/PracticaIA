<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario malo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <h2>Formulario del mal</h2>

        <form id="formulario">
            <label>Nombre de villano</label>
            <input type="text" id="nombre" placeholder="Nombre" required>

            <label>Identificacion</label>
            <input type="text" id="identificacion" placeholder="Identificacion" required>

            <label>Correo</label>
            <input type="text" id="correo" placeholder="Correo" required>

            <button type="submit">Enviar</button>
            
            
        </form>
    </div>

    <button id="btnVer">Ver Datos Guardados</button>
    <div id="resultado"></div>

    <script src="scripts.js"></script>
</body>
</html>
